<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Comunidade Tinder Gospel</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green: #25D366;
    --green-dark: #128C7E;
    --green-light: #DCF8C6;
    --bg-chat: #E5DDD5;
    --bubble-in: #FFFFFF;
    --bubble-out: #DCF8C6;
    --header-bg: #128C7E;
    --text-dark: #1a1a1a;
    --text-muted: #667781;
    --text-white: #ffffff;
    --shadow: 0 1px 2px rgba(0,0,0,0.13);
    --radius-bubble: 8px;
    --font: 'Nunito', sans-serif;
  }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
  }

  body {
    font-family: var(--font);
    background: #c9d8db;
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
  }

  .phone-frame {
    width: 100%;
    max-width: 420px;
    height: 100vh;
    height: 100dvh;
    max-height: none;
    background: var(--bg-chat);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    border-radius: 0;
    position: relative;
  }

  @media (min-width: 480px) {
    .phone-frame {
      border-radius: 20px;
      height: min(92vh, 860px);
    }
    body { background: #b0bec5; }
  }

  /* HEADER */
  .header {
    background: var(--header-bg);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
    position: relative;
    z-index: 10;
    box-shadow: 0 2px 6px rgba(0,0,0,0.18);
  }

  .avatar {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    background: linear-gradient(135deg, #a8edea, #fed6e3);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
    overflow: hidden;
    border: 2px solid rgba(255,255,255,0.3);
    object-fit: cover;
  }
  .avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 50%;
  }

  .header-info { flex: 1; }
  .header-name { font-size: 15px; font-weight: 700; color: #fff; line-height: 1.2; }
  .header-sub { font-size: 11px; color: rgba(255,255,255,0.85); }
  .header-status { font-size: 11px; color: #a8edea; font-weight: 600; }

  .header-icons { display: flex; gap: 18px; }
  .header-icons span { color: rgba(255,255,255,0.85); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; opacity: 0.9; transition: opacity 0.15s; }
  .header-icons span:hover { opacity: 1; }

  /* CHAT AREA */
  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 12px 12px 8px;
    display: flex;
    flex-direction: column;
    gap: 3px;
    scroll-behavior: smooth;
    background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M11 18c3.866 0 7-3.134 7-7s-3.134-7-7-7-7 3.134-7 7 3.134 7 7 7zm48 25c3.866 0 7-3.134 7-7s-3.134-7-7-7-7 3.134-7 7 3.134 7 7 7zm-43-7c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zm63 31c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zM34 90c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zm56-76c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zM12 86c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm28-65c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm23-11c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm-6 60c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm29 22c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zM32 63c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm57-13c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm-9-21c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM60 91c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM35 41c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM12 60c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2z' fill='%23c5b9b0' fill-opacity='0.15' fill-rule='evenodd'/%3E%3C/svg%3E");
  }

  .chat-area::-webkit-scrollbar { width: 4px; }
  .chat-area::-webkit-scrollbar-track { background: transparent; }
  .chat-area::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 4px; }

  /* BUBBLES */
  .bubble-wrap {
    display: flex;
    flex-direction: column;
    margin-bottom: 2px;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.3s ease, transform 0.3s ease;
  }
  .bubble-wrap.show { opacity: 1; transform: translateY(0); }
  .bubble-wrap.in { align-items: flex-start; }
  .bubble-wrap.out { align-items: flex-end; }

  .bubble {
    max-width: 78%;
    padding: 7px 11px;
    font-size: 14px;
    line-height: 1.45;
    color: var(--text-dark);
    position: relative;
    word-break: break-word;
  }

  .bubble.in {
    background: var(--bubble-in);
    border-radius: 0 var(--radius-bubble) var(--radius-bubble) var(--radius-bubble);
    box-shadow: var(--shadow);
  }

  .bubble.out {
    background: var(--bubble-out);
    border-radius: var(--radius-bubble) 0 var(--radius-bubble) var(--radius-bubble);
    box-shadow: var(--shadow);
  }

  .bubble-time {
    font-size: 10px;
    color: var(--text-muted);
    text-align: right;
    margin-top: 2px;
    padding-right: 2px;
  }

  .bubble.in.first::before {
    content: '';
    position: absolute;
    left: -7px;
    top: 0;
    border-width: 0 8px 8px 0;
    border-style: solid;
    border-color: transparent var(--bubble-in) transparent transparent;
  }

  .bubble.out.first::after {
    content: '';
    position: absolute;
    right: -7px;
    top: 0;
    border-width: 0 0 8px 8px;
    border-style: solid;
    border-color: transparent transparent transparent var(--bubble-out);
  }

  .bubble .tick { color: #34B7F1; font-size: 12px; }

  /* TYPING INDICATOR */
  .typing-wrap {
    display: flex;
    align-items: flex-start;
    margin-bottom: 4px;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .typing-wrap.show { opacity: 1; }

  .typing-bubble {
    background: var(--bubble-in);
    border-radius: 0 var(--radius-bubble) var(--radius-bubble) var(--radius-bubble);
    padding: 10px 14px;
    box-shadow: var(--shadow);
    display: flex;
    gap: 4px;
    align-items: center;
  }
  .typing-bubble::before {
    content: '';
    position: absolute;
    left: -7px;
    top: 0;
    border-width: 0 8px 8px 0;
    border-style: solid;
    border-color: transparent var(--bubble-in) transparent transparent;
  }
  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #aaa;
    animation: bounce 1.2s infinite ease-in-out;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-5px); }
  }

  /* DATE DIVIDER */
  .date-divider {
    text-align: center;
    margin: 10px 0;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .date-divider.show { opacity: 1; }
  .date-divider span {
    background: rgba(255,255,255,0.75);
    color: var(--text-muted);
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 10px;
    box-shadow: var(--shadow);
  }

  /* BUTTONS AREA */
  .buttons-area {
    padding: 8px 12px calc(10px + env(safe-area-inset-bottom, 0px));
    display: flex;
    flex-direction: column;
    gap: 7px;
    flex-shrink: 0;
    background: var(--bg-chat);
    opacity: 0;
    transform: translateY(10px);
    transition: opacity 0.3s, transform 0.3s;
    pointer-events: none;
  }
  .buttons-area.show { opacity: 1; transform: translateY(0); pointer-events: all; }

  .btn-option {
    background: #fff;
    border: 1.5px solid var(--green);
    color: var(--green-dark);
    border-radius: 24px;
    padding: 10px 18px;
    font-family: var(--font);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
    width: 100%;
    display: block;
  }
  .btn-option:hover { background: var(--green); color: #fff; }
  .btn-option:active { transform: scale(0.97); }

  .btn-cta {
    background: var(--green);
    border: none;
    color: #fff;
    border-radius: 24px;
    padding: 13px 18px;
    font-family: var(--font);
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
    width: 100%;
    display: block;
    text-decoration: none;
    box-shadow: 0 3px 12px rgba(37,211,102,0.35);
  }
  .btn-cta:hover { background: #1eb85a; transform: translateY(-1px); }
  .btn-cta:active { transform: scale(0.97); }

  .btn-support {
    background: transparent;
    border: 1.5px solid #aaa;
    color: var(--text-muted);
    border-radius: 24px;
    padding: 10px 18px;
    font-family: var(--font);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
    width: 100%;
    display: block;
    text-decoration: none;
  }
  .btn-support:hover { border-color: #667; color: #444; }

  /* INPUT area */
  .input-area {
    display: none;
    padding: 8px 10px calc(8px + env(safe-area-inset-bottom, 0px));
    background: #f0f0f0;
    gap: 8px;
    align-items: center;
    flex-shrink: 0;
  }
  .input-area.show { display: flex; }
  .input-field {
    flex: 1;
    border: none;
    border-radius: 22px;
    padding: 10px 16px;
    font-family: var(--font);
    font-size: 16px;
    outline: none;
    background: #fff;
    color: var(--text-dark);
  }
  .input-send {
    width: 42px; height: 42px;
    border-radius: 50%;
    background: var(--green);
    border: none;
    color: #fff;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
  }
  .input-send:hover { background: #1eb85a; }

  /* UPLOAD area */
  .upload-area {
    display: none;
    flex-direction: column;
    gap: 8px;
    padding: 10px 12px calc(10px + env(safe-area-inset-bottom, 0px));
    background: var(--bg-chat);
    flex-shrink: 0;
  }
  .upload-area.show { display: flex; }
  .upload-label {
    background: #fff;
    border: 2px dashed var(--green);
    border-radius: 12px;
    padding: 18px;
    text-align: center;
    cursor: pointer;
    color: var(--green-dark);
    font-size: 13px;
    font-weight: 600;
    transition: all 0.15s;
  }
  .upload-label:hover { background: #f0fff4; }
  .upload-label input { display: none; }
  .upload-ok {
    background: var(--green);
    border: none;
    color: #fff;
    border-radius: 24px;
    padding: 11px;
    font-family: var(--font);
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    display: none;
  }
  .upload-ok.show { display: block; }

  /* PIX box */
  .pix-box {
    background: #e8f8f1;
    border: 1.5px solid #25D366;
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 14px;
    font-weight: 700;
    color: #128C7E;
    text-align: center;
    letter-spacing: 0.5px;
    cursor: pointer;
    position: relative;
  }
  .pix-box::after { content: ' 📋'; font-size: 12px; }
  .pix-copied {
    font-size: 10px;
    color: var(--green);
    text-align: center;
    display: none;
    font-weight: 600;
    margin-top: 2px;
  }

  .spacer-bottom { height: env(safe-area-inset-bottom, 0px); flex-shrink: 0; }
</style>
</head>

<script>
const chat = document.getElementById('chat');
const btns = document.getElementById('btns');
const typingEl = document.getElementById('typing');
const dateDiv = document.getElementById('date-div');
const inputArea = document.getElementById('input-area');
const inputField = document.getElementById('input-field');
const inputSend = document.getElementById('input-send');
const uploadArea = document.getElementById('upload-area');
const fileInput = document.getElementById('file-input');
const uploadOk = document.getElementById('upload-ok');

const CHECKOUT = 'https://universal-checkout.vercel.app/checkout/9510d38c-d56d-4129-a6da-f44e56037753';
const SUPORTE = 'https://wa.me/5519920069960?text=Ol%C3%A1!%20Preciso%20de%20ajuda%20com%20a%20comunidade%2C%20por%20favor.';
// Endpoints internos (mesma origem). Segredos ficam somente no backend.
const ORDER_API_PATH = '/api/orders/direct-pix';
const CHECKOUT_ID = '9510d38c-d56d-4129-a6da-f44e56037753';

let inputCallback = null;
let uploadDone = false;
let autoScrollTimer = null;
let leadNome = '';
let leadEmail = '';
let leadPhone = '';
let pixOrderCreated = false;

function openExternalInNewTab(url) {
  window.open(url, '_blank', 'noopener,noreferrer');
}

function openCheckoutInNewTab() {
  openExternalInNewTab(CHECKOUT);
}

function scrollToBottom(behavior = 'smooth') {
  chat.scrollTo({ top: chat.scrollHeight, behavior });
}

function getTime() {
  const now = new Date();
  return now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
}

function generateTransactionId(prefix = 'wa') {
  return `${prefix}-${Date.now()}-${Math.random().toString(36).slice(2, 11)}`;
}

function getOrderPayload(status = 'created') {
  return {
    transaction_id: generateTransactionId('wa'),
    status,
    amount: 19.9,
    customer_name: String(leadNome || ''),
    customer_email: String(leadEmail || 'seu@email.com'),
    customer_phone: String(leadPhone || ''),
    checkout_id: CHECKOUT_ID,
    description: 'Comunidade Tinder Gospel',
    utmify_conversion_sent: false,
    meta_conversion_sent: false,
    utm_source: 'whatsapp',
    utm_medium: 'chat',
    utm_campaign: 'whatsapp_manual_order',
    utm_content: 'typebot_html_flow',
    utm_term: String(leadPhone || '')
  };
}

function sendInitiateCheckoutEvent() {
  const payload = {
    checkout_id: CHECKOUT_ID,
    description: 'Comunidade Tinder Gospel',
    value: 19.9,
    currency: 'BRL',
    customer_name: String(leadNome || ''),
    customer_email: String(leadEmail || ''),
    customer_phone: String(leadPhone || '')
  };

  if (typeof window.fbq === 'function') {
    window.fbq('track', 'InitiateCheckout', {
      value: payload.value,
      currency: payload.currency,
      content_name: payload.description,
      content_ids: [payload.checkout_id]
    });
  }

  if (typeof window.gtag === 'function') {
    window.gtag('event', 'begin_checkout', {
      currency: payload.currency,
      value: payload.value,
      item_name: payload.description,
      item_id: payload.checkout_id
    });
  }

  window.dataLayer = window.dataLayer || [];
  window.dataLayer.push({
    event: 'initiate_checkout',
    ...payload
  });
}

async function createDirectPixOrder() {
  if (pixOrderCreated) return;
  const orderPayload = getOrderPayload('created');
  const apiUrl = (() => {
    if (window.location.protocol === 'file:') return null;
    return `${window.location.origin}${ORDER_API_PATH}`;
  })();

  if (!apiUrl) {
    console.warn('Pix direto: API não chamada porque o HTML está em file://. Rode em servidor (Vercel/vercel dev).');
    return;
  }

  try {
    const response = await fetch(apiUrl, {
      method: 'POST',
      credentials: 'same-origin',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(orderPayload)
    });
    if (!response.ok) {
      let details = '';
      try {
        const body = await response.json();
        details = body?.error ? ` - ${body.error}` : '';
      } catch {}
      throw new Error(`HTTP ${response.status}${details}`);
    }
    pixOrderCreated = true;
  } catch (error) {
    // Permite nova tentativa se a requisição falhar
    pixOrderCreated = false;
    console.error('Erro ao criar ordem Pix direto:', error);
  }
}

function showTyping() {
  typingEl.classList.add('show');
  scrollToBottom();
}
function hideTyping() {
  typingEl.classList.remove('show');
}

function addBubble(text, dir='in', delay=0, isFirst=true) {
  return new Promise(resolve => {
    setTimeout(() => {
      hideTyping();
      const wrap = document.createElement('div');
      wrap.className = `bubble-wrap ${dir}`;

      const bubble = document.createElement('div');
      bubble.className = `bubble ${dir}${isFirst ? ' first' : ''}`;
      bubble.innerHTML = text;

      const time = document.createElement('div');
      time.className = 'bubble-time';
      time.innerHTML = getTime() + (dir==='out' ? ' <span class="tick">✓✓</span>' : '');

      wrap.appendChild(bubble);
      wrap.appendChild(time);
      chat.insertBefore(wrap, typingEl);

      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          wrap.classList.add('show');
          scrollToBottom();
        });
      });
      resolve();
    }, delay);
  });
}

function clearButtons() {
  btns.innerHTML = '';
  btns.classList.remove('show');
}

function showButtons(items) {
  clearButtons();
  setTimeout(() => {
    items.forEach(item => {
      const el = document.createElement(item.href ? 'a' : 'button');
      el.className = item.cta ? 'btn-cta' : item.support ? 'btn-support' : 'btn-option';
      el.textContent = item.label;
      if (item.href) {
        el.href = item.href;
        el.target = '_blank';
        el.rel = 'noopener noreferrer';
        el.addEventListener('click', e => {
          e.preventDefault();
          openExternalInNewTab(item.href);
        });
      }
      if (item.action) {
        el.addEventListener('click', () => {
          if (!item.href) {
            clearButtons();
            addUserBubble(item.label);
            setTimeout(() => item.action(), 400);
          }
        });
      }
      btns.appendChild(el);
    });
    btns.classList.add('show');
  }, 200);
}

function addUserBubble(text) {
  const wrap = document.createElement('div');
  wrap.className = 'bubble-wrap out';
  const bubble = document.createElement('div');
  bubble.className = 'bubble out first';
  bubble.textContent = text;
  const time = document.createElement('div');
  time.className = 'bubble-time';
  time.innerHTML = getTime() + ' <span class="tick">✓✓</span>';
  wrap.appendChild(bubble);
  wrap.appendChild(time);
  chat.insertBefore(wrap, typingEl);
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      wrap.classList.add('show');
      scrollToBottom();
    });
  });
}

function addPixBox(key) {
  const wrap = document.createElement('div');
  wrap.className = 'bubble-wrap in';
  const bubble = document.createElement('div');
  bubble.className = 'bubble in first';
  const box = document.createElement('div');
  box.className = 'pix-box';
  box.textContent = key;
  const copied = document.createElement('div');
  copied.className = 'pix-copied';
  copied.id = 'pix-copied-msg';
  copied.textContent = '✓ Chave copiada!';
  box.addEventListener('click', () => {
    navigator.clipboard.writeText(key).catch(()=>{});
    copied.style.display = 'block';
    setTimeout(() => copied.style.display = 'none', 2000);
  });
  bubble.appendChild(box);
  bubble.appendChild(copied);
  const time = document.createElement('div');
  time.className = 'bubble-time';
  time.textContent = getTime();
  wrap.appendChild(bubble);
  wrap.appendChild(time);
  chat.insertBefore(wrap, typingEl);
  requestAnimationFrame(() => { requestAnimationFrame(() => { wrap.classList.add('show'); scrollToBottom(); }); });
}

function showInput(placeholder, callback) {
  inputArea.classList.add('show');
  inputField.placeholder = placeholder || 'Digite aqui...';
  inputField.value = '';
  inputField.focus();
  inputCallback = callback;
}

function hideInput() {
  inputArea.classList.remove('show');
  inputCallback = null;
}

inputSend.addEventListener('click', () => {
  const val = inputField.value.trim();
  if (!val || !inputCallback) return;
  const cb = inputCallback;
  hideInput();
  addUserBubble(val);
  setTimeout(() => cb(val), 400);
});

inputField.addEventListener('keydown', e => {
  if (e.key === 'Enter') inputSend.click();
});

// ─── TIMING HUMANO ────────────────────────────────────────────────────────────
// Calcula delay realista: tempo de leitura da msg anterior + tempo de digitação
// ~200 chars/min de leitura, ~180 chars/min de digitação no celular
// + pequena variação aleatória para soar natural

function humanDelay(text) {
  const plain = text.replace(/<[^>]+>/g, ''); // remove HTML tags
  const chars = plain.length;
  const readPause = 600;                          // tempo mínimo antes de começar a digitar
  const typingMs = Math.min(chars * 38, 3200);    // ~38ms/char, máx 3.2s
  const jitter = Math.random() * 400 - 200;       // ±200ms de variação humana
  return Math.max(700, readPause + typingMs + jitter);
}

// Envia mensagem com timing humano: espera, mostra digitando, envia
async function send(text, isFirst = false) {
  const delay = humanDelay(text);
  if (autoScrollTimer) clearInterval(autoScrollTimer);
  autoScrollTimer = setInterval(() => scrollToBottom('auto'), 120);
  showTyping();
  await new Promise(r => setTimeout(r, delay));
  await addBubble(text, 'in', 0, isFirst);
  clearInterval(autoScrollTimer);
  autoScrollTimer = null;
  scrollToBottom();
}
